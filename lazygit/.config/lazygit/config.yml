gui:
  nerdFontsVersion: "3"
  theme:
    activeBorderColor:
      - "#88c0d0"
      - bold
    inactiveBorderColor:
      - "#4c566a"
    searchingActiveBorderColor:
      - "#ebcb8b"
      - bold
    selectedLineBgColor:
      - "#3b4252"
    selectedRangeBgColor:
      - "#3b4252"
    cherryPickedCommitFgColor:
      - "#88c0d0"
    cherryPickedCommitBgColor:
      - "#2e3440"
    unstagedChangesColor:
      - "#bf616a"
    defaultFgColor:
      - "#d8dee9"
    optionsTextColor:
      - "#88c0d0"
os:
  editPreset: "nvim-remote"
git:
  parseEmoji: true
  paging:
    colorArg: always
customCommands:
  - key: '<c-c>'
    description: Commit message with gitmoji
    context: 'global'
    command: "~/.local/bin/scripts/commit-message-with-gitmoji.sh \"{{.Form.Emoji}}\" \"{{.Form.Scope}}\" \"{{.Form.Description}}\""
    prompts:
      - type: 'menuFromCommand'
        title: 'What kind of change is it?'
        key: 'Emoji'
        command: 'gitmoji -l'
        filter: '(?P<unicode>[^ -]+) - (?P<emoji>[^ -]+) - (?P<type>.+)'
        valueFormat: '{{ .emoji }}'
        labelFormat: '{{ .unicode }} {{ .type }}'
      - type: 'input'
        title: 'Description of the change'
        key: 'Description'
        initialValue: ''
      - type: 'input'
        title: 'Scope (optional)'
        key: 'Scope'
        initialValue: ''
  - key: '<c-x>'
    description: Commit message with gitmoji 2
    context: 'global'
    command: "~/.local/bin/scripts/commit-message-with-gitmoji.sh \"{{.Form.Emoji}}\" \"{{.Form.Scope}}\" \"{{.Form.Description}}\""
    prompts:
    - type: 'input'
      title: 'What kind of change is it?'
      key: 'Emoji'
      suggestions:
        command: "gitmoji -l"
    - type: 'input'
      title: 'Description of the change'
      key: 'Description'
      initialValue: ''
    - type: 'input'
      title: 'Scope (optional)'
      key: 'Scope'
      initialValue: ''
  - key: '<c-z>'
    context: 'global'
    command: "~/.local/bin/scripts/commit-message-with-gitmoji-and-branch-name.sh \"{{.Form.Emoji}}\" \"{{.Form.Description}}\""
    prompts:
    - type: 'input'
      title: 'What kind of change is it?'
      key: 'Emoji'
      suggestions:
        command: "gitmoji -l"
    - type: 'input'
      title: 'Description of the change'
      key: 'Description'
      initialValue: ''
services:
  gh_personal: 'github:github.com'
  gh_nuvo: 'github:github.com'
